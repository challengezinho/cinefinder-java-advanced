---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:cinefinder;MODE=Oracle
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/h2